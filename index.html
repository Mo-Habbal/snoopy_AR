<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
    #cam    { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }

    #splash {
      position: fixed; inset: 0; z-index: 10; background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #splash h1 { color: #fff; font-size: 28px; font-weight: 700; font-family: -apple-system, sans-serif; }
    #splash p  { color: rgba(255,255,255,0.5); font-size: 15px; font-family: -apple-system, sans-serif; text-align: center; max-width: 260px; line-height: 1.6; }
    #start-btn {
      padding: 16px 48px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 40px;
      font-size: 18px; font-weight: 700; cursor: pointer; font-family: -apple-system, sans-serif;
    }
    #hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      color: #fff; font-family: -apple-system, sans-serif; font-size: 14px;
      padding: 10px 22px; border-radius: 24px; z-index: 5; pointer-events: none;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hint" style="display:none">Point at the Snoopy QR code 📷</div>

  <div id="splash">
    <h1>Snoopy AR 🐾</h1>
    <p>Point your camera at the Snoopy QR code to bring him to life.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    document.getElementById('start-btn').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        document.getElementById('cam').srcObject = stream;
      } catch (e) {
        alert('Camera permission needed. Please allow and try again.');
        return;
      }
      document.getElementById('splash').style.display = 'none';
      document.getElementById('hint').style.display = 'block';
      initAR();
    });

    function initAR() {
      const canvas  = document.getElementById('canvas');
      const video   = document.getElementById('cam');
      const hint    = document.getElementById('hint');

      // ── Three.js ──────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.4;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene  = new THREE.Scene();
      const cam3   = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 1000);

      scene.add(new THREE.AmbientLight(0xffffff, 2.5));
      const key = new THREE.DirectionalLight(0xffffff, 3);
      key.position.set(2, 4, 3); scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 1.5);
      fill.position.set(-2, 1, -2); scene.add(fill);

      const pivot = new THREE.Group();
      pivot.position.set(0, 0, -1.5);
      pivot.visible = false;
      scene.add(pivot);

      let mixer = null;
      let model = null;

      new GLTFLoader().load('snoopy.glb', (gltf) => {
        model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const sc = 0.5 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(sc);
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(-center.x * sc, -center.y * sc - 0.2, 0);
        pivot.add(model);
        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(c => mixer.clipAction(c).play());
      });

      // ── QR scanning (every 200 ms) ────────────────────────────
      const qrCanvas = document.createElement('canvas');
      const qrCtx    = qrCanvas.getContext('2d', { willReadFrequently: true });
      let qrVisible  = false;
      let lastSeen   = 0;

      setInterval(() => {
        if (video.readyState < video.HAVE_ENOUGH_DATA) return;
        const W = Math.floor(video.videoWidth  / 2);
        const H = Math.floor(video.videoHeight / 2);
        if (!W || !H) return;
        qrCanvas.width = W; qrCanvas.height = H;
        qrCtx.drawImage(video, 0, 0, W, H);
        const img  = qrCtx.getImageData(0, 0, W, H);
        const code = jsQR(img.data, W, H);
        if (code) {
          lastSeen = Date.now();
          if (!qrVisible && model) {
            qrVisible = true;
            pivot.visible = true;
            hint.style.opacity = '0';
          }
        } else if (qrVisible && Date.now() - lastSeen > 800) {
          qrVisible = false;
          pivot.visible = false;
          hint.style.opacity = '1';
        }
      }, 200);

      // ── Touch rotation (Y axis only) ──────────────────────────
      let rotY = 0;
      let lastTouchX = null;

      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        lastTouchX = e.touches[0].clientX;
      }, { passive: false });

      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const x = e.touches[0].clientX;
        rotY += (x - lastTouchX) * 0.012;
        lastTouchX = x;
      }, { passive: false });

      canvas.addEventListener('touchend', () => { lastTouchX = null; }, { passive: true });

      // Mouse fallback for desktop
      let mouseDown = false, lastMouseX = 0;
      canvas.addEventListener('mousedown', e => { mouseDown = true; lastMouseX = e.clientX; });
      window.addEventListener('mousemove', e => {
        if (!mouseDown) return;
        rotY += (e.clientX - lastMouseX) * 0.012;
        lastMouseX = e.clientX;
      });
      window.addEventListener('mouseup', () => mouseDown = false);

      // ── Render loop ───────────────────────────────────────────
      const clock = new THREE.Clock();
      let t = 0;

      renderer.setAnimationLoop(() => {
        const delta = clock.getDelta();
        t += delta;
        if (mixer) mixer.update(delta);
        pivot.rotation.y = rotY;
        if (model) model.position.y = -0.2 + Math.sin(t * 1.5) * 0.04;
        renderer.render(scene, cam3);
      });

      window.addEventListener('resize', () => {
        renderer.setSize(innerWidth, innerHeight);
        cam3.aspect = innerWidth / innerHeight;
        cam3.updateProjectionMatrix();
      });
    }
  </script>
</body>
</html>
