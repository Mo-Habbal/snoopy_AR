<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      font-family: -apple-system, sans-serif; font-size: 14px;
      padding: 8px 18px; border-radius: 20px; z-index: 100;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
  </style>
</head>
<body>
  <div id="status">⏳ Loading scripts…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <script>
    const status = document.getElementById('status');
    function setStatus(msg) { status.textContent = msg; console.log('[AR]', msg); }

    setStatus('⏳ Scripts loaded, starting AR…');

    async function startAR() {
      try {
        const { MindARThree } = window.MINDAR.IMAGE;

        setStatus('⏳ Building scene…');
        const mindarThree = new MindARThree({
          container: document.body,
          imageTargetSrc: 'targets.mind',
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no',
        });

        const { renderer, scene, camera } = mindarThree;

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const dir = new THREE.DirectionalLight(0xffffff, 1.5);
        dir.position.set(1, 2, 1);
        scene.add(dir);

        const anchor = mindarThree.addAnchor(0);

        setStatus('⏳ Loading Snoopy model…');
        const loader = new THREE.GLTFLoader();
        const gltf = await new Promise((res, rej) => {
          loader.load('source/My%20Snoopy%20Model.glb', res, undefined, rej);
        });

        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.8 / maxDim;
        model.scale.setScalar(scale);
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(
          -center.x * scale,
          -center.y * scale + 0.1,
          -center.z * scale
        );

        anchor.group.add(model);

        anchor.onTargetFound = () => { setStatus('🐶 Snoopy found!'); };
        anchor.onTargetLost  = () => { setStatus('📷 Point at the QR code'); };

        let t = 0;
        renderer.setAnimationLoop(() => {
          t += 0.02;
          model.position.y = -center.y * scale + 0.1 + Math.sin(t) * 0.03;
          renderer.render(scene, camera);
        });

        setStatus('📷 Starting camera…');
        await mindarThree.start();
        setStatus('📷 Point at the Snoopy QR code');

      } catch (err) {
        setStatus('❌ ' + err.message);
        console.error(err);
      }
    }

    window.addEventListener('load', startAR);
  </script>
</body>
</html>
