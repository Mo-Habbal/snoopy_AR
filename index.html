<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; }
    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #start-screen p {
      color: rgba(255,255,255,0.6);
      font-family: -apple-system, sans-serif;
      font-size: 16px; text-align: center;
      max-width: 260px; line-height: 1.6;
    }
    #start-btn {
      padding: 16px 48px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 40px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      font-family: -apple-system, sans-serif;
    }
    #loading-msg {
      display: none;
      color: rgba(255,255,255,0.5);
      font-family: -apple-system, sans-serif;
      font-size: 15px; text-align: center;
    }
  </style>
</head>
<body>
  <div id="start-screen">
    <p>Point your camera at the<br>Snoopy QR code 🐾</p>
    <button id="start-btn">Start AR</button>
    <div id="loading-msg">Loading AR engine…</div>
  </div>

  <script>
    document.getElementById('start-btn').addEventListener('click', function() {
      this.style.display = 'none';
      document.getElementById('loading-msg').style.display = 'block';

      // Load MindAR only after user taps
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
      s.onload = function() {
        document.getElementById('start-screen').style.display = 'none';

        document.body.insertAdjacentHTML('beforeend', `
          <a-scene
            id="arscene"
            mindar-image="imageTargetSrc: targets.mind"
            color-space="sRGB"
            renderer="colorManagement: true; physicallyCorrectLights: true"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
          >
            <a-assets>
              <a-asset-item id="snoopy" src="source/snoopy.glb"></a-asset-item>
            </a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity mindar-image-target="targetIndex: 0">
              <a-gltf-model src="#snoopy" scale="0.05 0.05 0.05" position="0 0.05 0"></a-gltf-model>
            </a-entity>
          </a-scene>
        `);
      };
      document.head.appendChild(s);
    });
  </script>
</body>
</html>
